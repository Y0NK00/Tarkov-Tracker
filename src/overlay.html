<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>Kappa Tracker Overlay</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#060809; --surface:#0b1016; --surface2:#0f161e;
  --border:#1a2535; --border2:#223040;
  --gold:#c8a84b; --gold2:#e8c76a;
  --green:#4caf6e; --red:#e05252; --blue:#4a8fd4;
  --text:#c8d0de; --text2:#6e7f96; --text3:#354555;
}
html,body{width:100%;height:100%;overflow:hidden;}
body{
  background:var(--bg);
  color:var(--text);
  font-family:'Segoe UI',sans-serif;
  font-size:13px;
  border:1px solid var(--border);
  display:flex;
  flex-direction:column;
}

/* ── Title bar ── */
#title-bar{
  background:var(--surface);
  border-bottom:1px solid var(--border);
  padding:7px 10px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  -webkit-app-region:drag;
  flex-shrink:0;
}
#title-bar h1{
  font-family:'Rajdhani','Segoe UI',sans-serif;
  font-size:12px;font-weight:700;letter-spacing:2.5px;
  color:var(--gold);text-transform:uppercase;
}
#title-bar .close-btn{
  -webkit-app-region:no-drag;
  background:none;border:none;color:var(--text3);
  font-size:14px;cursor:pointer;padding:0 2px;line-height:1;
  transition:color .15s;
}
#title-bar .close-btn:hover{color:var(--red);}

/* ── Scrollable body ── */
#body{overflow-y:auto;flex:1;}
#body::-webkit-scrollbar{width:4px;}
#body::-webkit-scrollbar-track{background:transparent;}
#body::-webkit-scrollbar-thumb{background:var(--border2);}

/* ── Section ── */
.section{
  padding:10px 13px;
  border-bottom:1px solid var(--border);
}
.section:last-child{border-bottom:none;}
.sec-title{
  font-family:'Rajdhani','Segoe UI',sans-serif;
  font-size:9px;font-weight:700;letter-spacing:2px;
  color:var(--text3);text-transform:uppercase;margin-bottom:7px;
}
.row{
  display:flex;justify-content:space-between;align-items:baseline;
  margin-bottom:3px;
}
.row:last-child{margin-bottom:0;}
.row-label{font-size:11px;color:var(--text2);}
.row-val{
  font-family:'Share Tech Mono','Courier New',monospace;
  font-size:11px;color:var(--text);
}
.row-val.dim{color:var(--text3);}
.profile-line{font-size:13px;color:var(--text);}
.badge-bear{color:var(--blue);}
.badge-usec{color:#d4834a;}
.badge-none{color:var(--text3);}

/* ── Progress bar ── */
.prog-wrap{margin-top:6px;}
.prog-bar{height:2px;background:var(--surface2);}
.prog-fill{height:100%;background:var(--gold);transition:width .3s;}

/* ── Active quests list ── */
.aq-item{
  padding:5px 0;
  border-bottom:1px solid var(--border);
  font-size:11px;
}
.aq-item:last-child{border-bottom:none;}
.aq-name{color:var(--text);margin-bottom:1px;}
.aq-trader{font-size:10px;color:var(--text3);font-family:'Share Tech Mono',monospace;letter-spacing:.5px;}
.aq-empty{font-size:11px;color:var(--text3);font-style:italic;}

/* ── Game state pill ── */
#game-pill{
  display:flex;align-items:center;gap:5px;
  padding:3px 8px;border:1px solid var(--border2);
  background:var(--surface2);
}
.g-dot{width:6px;height:6px;border-radius:50%;background:var(--text3);flex-shrink:0;}
.g-label{font-family:'Share Tech Mono',monospace;font-size:9px;letter-spacing:1px;color:var(--text3);}
</style>
</head>
<body>

<div id="title-bar">
  <div style="display:flex;align-items:center;gap:8px;">
    <span style="font-size:14px;color:var(--gold);">κ</span>
    <h1>Tarkov Overlay</h1>
  </div>
  <div style="display:flex;align-items:center;gap:8px;-webkit-app-region:no-drag;">
    <div id="game-pill">
      <span class="g-dot" id="g-dot"></span>
      <span class="g-label" id="g-label">OFFLINE</span>
    </div>
    <button class="close-btn" id="close-btn">✕</button>
  </div>
</div>

<div id="body">

  <!-- Profile -->
  <div class="section">
    <div class="sec-title">Profile</div>
    <div class="profile-line" id="profile-line">Level — &bull; <span class="badge-none">—</span></div>
  </div>

  <!-- Kappa progress -->
  <div class="section">
    <div class="sec-title">Kappa progress</div>
    <div class="row">
      <span class="row-label">Quests</span>
      <span class="row-val" id="kappa-q">0/—</span>
    </div>
    <div class="row">
      <span class="row-label">Collector items</span>
      <span class="row-val" id="kappa-c">0/—</span>
    </div>
    <div class="prog-wrap">
      <div class="prog-bar"><div class="prog-fill" id="kappa-fill" style="width:0%"></div></div>
    </div>
  </div>

  <!-- Raid plan -->
  <div class="section">
    <div class="sec-title">Raid plan</div>
    <div class="row">
      <span class="row-label">Map</span>
      <span class="row-val dim" id="raid-map">Not set</span>
    </div>
    <div class="row">
      <span class="row-label">Objective</span>
      <span class="row-val dim" id="raid-obj">Not set</span>
    </div>
    <div class="row">
      <span class="row-label">Extracts</span>
      <span class="row-val dim" id="raid-ext">Not set</span>
    </div>
  </div>

  <!-- Active quests (top 5 for current map) -->
  <div class="section">
    <div class="sec-title" id="aq-title">Active quests</div>
    <div id="aq-list"><div class="aq-empty">No active quests</div></div>
  </div>

  <!-- Keys / meds / ammo -->
  <div class="section">
    <div class="sec-title">Keys / meds / ammo</div>
    <div class="row">
      <span class="row-label">Keys</span>
      <span class="row-val dim" id="item-keys">-</span>
    </div>
    <div class="row">
      <span class="row-label">Meds</span>
      <span class="row-val dim" id="item-meds">-</span>
    </div>
    <div class="row">
      <span class="row-label">Ammo</span>
      <span class="row-val dim" id="item-ammo">-</span>
    </div>
  </div>

</div><!-- /body -->

<script>
'use strict';

// State
let progressData = null;
let gameState = { inGame: false, matchmaking: false, inRaid: false, currentMap: null };

// ── Helpers ──────────────────────────────────────────────────────────────────

function cap(str) {
  if (!str) return str;
  return str.replace(/-/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
}

function setGamePill(state) {
  const dot = document.getElementById('g-dot');
  const lbl = document.getElementById('g-label');
  if (state.inRaid) {
    dot.style.background = '#e05252'; lbl.textContent = 'IN RAID';
    lbl.style.color = '#e05252';
  } else if (state.matchmaking) {
    dot.style.background = '#c8a84b'; lbl.textContent = 'MATCHING';
    lbl.style.color = '#c8a84b';
  } else if (state.inGame) {
    dot.style.background = '#4caf6e'; lbl.textContent = 'IN GAME';
    lbl.style.color = '#4caf6e';
  } else {
    dot.style.background = '#354555'; lbl.textContent = 'OFFLINE';
    lbl.style.color = '#354555';
  }
}

function renderProfile(data) {
  const level = data.level || '—';
  const faction = data.faction;
  const fClass = faction === 'bear' ? 'badge-bear' : faction === 'usec' ? 'badge-usec' : 'badge-none';
  const fLabel = faction ? faction.toUpperCase() : '—';
  document.getElementById('profile-line').innerHTML =
    `Level ${level} &bull; <span class="${fClass}">${fLabel}</span>`;
}

function renderKappa(data) {
  const kd = data.kappaDone   || 0;
  const kt = data.kappaTotal  || '—';
  const cd = data.collectorDone  || 0;
  const ct = data.collectorTotal || '—';
  const pct = (typeof kt === 'number' && kt > 0) ? Math.round(kd / kt * 100) : 0;

  document.getElementById('kappa-q').textContent  = `${kd}/${kt}`;
  document.getElementById('kappa-c').textContent  = `${cd}/${ct}`;
  document.getElementById('kappa-fill').style.width = pct + '%';
}

function renderMap(map) {
  const el = document.getElementById('raid-map');
  if (map) { el.textContent = cap(map); el.classList.remove('dim'); }
  else      { el.textContent = 'Not set'; el.classList.add('dim'); }
}

function renderActiveQuests(data) {
  const listEl = document.getElementById('aq-list');
  const titleEl = document.getElementById('aq-title');
  const map = gameState.currentMap;

  // Filter quests that are not completed and relevant to map (if known)
  const quests = (data.activeQuests || []).slice(0, 6);

  titleEl.textContent = map ? `Active quests — ${cap(map)}` : 'Active quests';

  if (!quests.length) {
    listEl.innerHTML = '<div class="aq-empty">No active quests</div>';
    return;
  }
  listEl.innerHTML = quests.map(q => `
    <div class="aq-item">
      <div class="aq-name">${q.name}</div>
      <div class="aq-trader">${q.trader || ''}</div>
    </div>
  `).join('');
}

function renderRaidItems(data) {
  const items = data.raidItemNames || [];
  const keys  = items.filter(n => /key|keycard/i.test(n));
  const meds  = items.filter(n => /medkit|salewa|ifak|cms|grizzly|splint|morphine|propital|analgin|augmentin/i.test(n));
  const ammo  = items.filter(n => /ammo|round|cartridge|bullet|bp|bt|ps |pp |fmj|ap /i.test(n));

  function fmt(arr) { return arr.length ? arr.slice(0,3).join(', ') + (arr.length > 3 ? ` +${arr.length-3}` : '') : '-'; }

  const ke = document.getElementById('item-keys');
  const me = document.getElementById('item-meds');
  const ae = document.getElementById('item-ammo');

  ke.textContent = fmt(keys);   ke.classList.toggle('dim', !keys.length);
  me.textContent = fmt(meds);   me.classList.toggle('dim', !meds.length);
  ae.textContent = fmt(ammo);   ae.classList.toggle('dim', !ammo.length);
}

// ── Apply full update ─────────────────────────────────────────────────────────

function applyUpdate(data) {
  if (!data) return;
  progressData = data;

  renderProfile(data);
  renderKappa(data);
  renderMap(data.currentMap || gameState.currentMap);
  renderActiveQuests(data);
  renderRaidItems(data);
}

// ── Game events ───────────────────────────────────────────────────────────────

function handleGameEvent(event) {
  if (!event) return;
  switch (event.type) {
    case 'matchmaking':
      gameState = Object.assign({}, gameState, event.state || {});
      setGamePill(gameState);
      break;
    case 'raid-start':
      gameState = Object.assign({}, gameState, event.state || {});
      setGamePill(gameState);
      break;
    case 'raid-end':
      gameState = Object.assign({}, gameState, event.state || {}, { currentMap: null });
      setGamePill(gameState);
      renderMap(null);
      break;
    case 'map-detected':
      gameState.currentMap = event.map;
      renderMap(event.map);
      if (progressData) renderActiveQuests(progressData);
      break;
    case 'game-launched':
      gameState = Object.assign({}, gameState, event.state || { inGame: true });
      setGamePill(gameState);
      break;
  }
}

// ── Init ──────────────────────────────────────────────────────────────────────

document.getElementById('close-btn').addEventListener('click', () => {
  if (window.overlayAPI) window.overlayAPI.close();
});

if (window.overlayAPI) {
  // Load initial data
  window.overlayAPI.getProgress().then(data => {
    if (data) applyUpdate(data);
  });
  // Load game state
  window.overlayAPI.getGameState().then(gs => {
    if (gs) { gameState = gs; setGamePill(gs); renderMap(gs.currentMap); }
  });
  // Subscribe to updates
  window.overlayAPI.onUpdate(data => applyUpdate(data));
  window.overlayAPI.onGameEvent(event => handleGameEvent(event));
}
</script>
</body>
</html>
